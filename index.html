<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyStream — Music Transposer for Worship Teams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0c14;
  --bg2: #16131f;
  --bg3: #1e1a2e;
  --bg4: #251f38;
  --accent: #c8a96e;
  --accent2: #e8c98e;
  --purple: #7c6bdc;
  --purple-light: #a898f0;
  --text: #f0eee8;
  --text2: #9e9ba8;
  --text3: #6a6778;
  --border: rgba(200,169,110,0.15);
  --border2: rgba(200,169,110,0.08);
  --red: #e06060;
  --green: #6ec89a;
  --radius: 12px;
  --rsm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(124,107,220,0.12) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 80% 80%,rgba(200,169,110,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}

.layout{position:relative;z-index:1;display:grid;grid-template-columns:280px 1fr;min-height:100vh;max-width:1200px;margin:0 auto;}
.sidebar{border-right:1px solid var(--border2);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden;}
.main{padding:32px 28px 80px;overflow-y:auto;}
.logo{font-family:'Instrument Serif',serif;font-size:28px;color:var(--text);letter-spacing:-0.3px;padding:24px 20px 20px;}
.logo em{font-style:italic;color:var(--accent);}

.sidebar-section{padding:0 16px;margin-bottom:8px;}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);padding:0 4px;margin-bottom:8px;}
.sidebar-scroll{flex:1;overflow-y:auto;padding-bottom:20px;}
.sidebar-scroll::-webkit-scrollbar{width:4px;}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

.song-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rsm);cursor:pointer;transition:all 0.15s;border:1px solid transparent;margin-bottom:4px;}
.song-item:hover{background:var(--bg3);border-color:var(--border2);}
.song-item.active{background:rgba(200,169,110,0.1);border-color:rgba(200,169,110,0.25);}
.song-thumb{width:36px;height:36px;border-radius:6px;background:var(--bg4);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);}
.song-meta{flex:1;min-width:0;}
.song-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;margin-bottom:14px;position:relative;animation:fadeUp 0.35s ease both;}
.card-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-label::after{content:'';flex:1;height:1px;background:var(--border2);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--rsm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;cursor:pointer;transition:all 0.15s;border:1px solid var(--border);background:transparent;color:var(--text2);}
.btn:hover{color:var(--text);border-color:rgba(200,169,110,0.3);background:rgba(200,169,110,0.05);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#0e0c14;font-weight:500;}
.btn-accent:hover{background:var(--accent2);border-color:var(--accent2);}
.btn-sm{padding:6px 12px;font-size:12px;}

.upload-zone{border:1.5px dashed rgba(200,169,110,0.2);border-radius:var(--rsm);padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(200,169,110,0.04);}
.upload-icon{width:48px;height:48px;border-radius:50%;background:rgba(200,169,110,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.upload-icon svg{width:22px;height:22px;fill:var(--accent);}
.upload-title{font-size:15px;color:var(--text);margin-bottom:3px;}
.upload-sub{font-size:13px;color:var(--text3);}

.file-loaded{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(110,200,154,0.08);border:1px solid rgba(110,200,154,0.2);border-radius:var(--rsm);margin-top:12px;}
.file-loaded svg{width:16px;height:16px;fill:var(--green);flex-shrink:0;}
.file-name-text{font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.key-section-label{font-size:12px;color:var(--text2);margin-bottom:8px;}
.key-row{display:flex;gap:5px;flex-wrap:wrap;}
.key-btn{width:52px;height:50px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.key-btn .enh{font-size:9px;color:var(--text3);}
.key-btn.orig-sel{background:rgba(124,107,220,0.15);border-color:var(--purple);color:var(--purple-light);}
.key-btn.tgt-sel{background:var(--accent);border-color:var(--accent);color:#0e0c14;font-weight:500;}

.shift-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:13px;background:rgba(200,169,110,0.08);color:var(--text2);border:1px solid rgba(200,169,110,0.12);margin-top:14px;}
.shift-badge.active{background:rgba(200,169,110,0.12);color:var(--accent);border-color:rgba(200,169,110,0.25);}

.slider-row{display:flex;align-items:center;gap:14px;}
.slider-label{font-size:13px;color:var(--text2);min-width:70px;}
.slider-val{font-size:14px;color:var(--text);min-width:62px;text-align:right;}
input[type=range]{flex:1;appearance:none;background:transparent;cursor:pointer;height:20px;}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:var(--bg4);border-radius:2px;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);margin-top:-6px;border:2px solid var(--bg2);}

.player-row{display:flex;align-items:center;gap:14px;}
.play-btn{width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;color:#0e0c14;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.play-btn:hover{background:var(--accent2);transform:scale(1.04);}
.play-btn:disabled{background:var(--bg4);cursor:not-allowed;}
.play-btn svg{width:20px;height:20px;fill:#0e0c14;}

.timeline{height:4px;background:var(--bg4);border-radius:2px;cursor:pointer;position:relative;flex:1;}
.timeline-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;pointer-events:none;}
.status-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg3);border-radius:var(--rsm);margin-top:12px;font-size:13px;color:var(--text2);min-height:38px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.dot.playing{background:var(--green);animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

@media(max-width:680px){
  .layout{grid-template-columns:1fr;}
  .sidebar{height:auto;position:static;border-right:none;border-bottom:1px solid var(--border2);}
  .main{padding:20px 16px 60px;}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">Key<em>Stream</em></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Song library</div>
    </div>
    <div class="sidebar-scroll" id="libraryList">
      <div class="sidebar-section">
        <div class="empty-library" id="emptyLibrary">No songs saved yet.</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="card">
      <div class="card-label">Audio file</div>
      <div class="upload-zone" id="dropzone">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6zm-2 16a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
        </div>
        <div class="upload-title">Drop your audio file here</div>
        <div class="upload-sub">or <span id="browseLink" style="color:var(--accent);cursor:pointer;">browse files</span></div>
      </div>
      <input type="file" id="fileInput" accept="audio/*" style="display:none">
      <div id="fileLoaded" style="display:none" class="file-loaded">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        <span class="file-name-text" id="loadedName"></span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Controls</div>
      <div class="slider-row" style="margin-bottom:20px;">
        <span class="slider-label">Speed</span>
        <input type="range" id="speedSlider" min="50" max="150" value="100" step="1">
        <span class="slider-val" id="speedVal">1.00×</span>
      </div>
      <div>
        <div class="key-section-label">Original Key</div>
        <div class="key-row" id="originalKeyRow"></div>
      </div>
      <div style="margin-top:20px;">
        <div class="key-section-label">Target Key</div>
        <div class="key-row" id="targetKeyRow"></div>
      </div>
      <div><span class="shift-badge" id="shiftBadge">No shift</span></div>
    </div>

    <div class="card">
      <div class="card-label">Playback</div>
      <div class="player-row">
        <button class="play-btn" id="playBtn" disabled>
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="timeline" id="timeline">
          <div class="timeline-fill" id="timelineFill"></div>
        </div>
      </div>
      <div class="status-row">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Load a file to begin</span>
      </div>
    </div>
  </main>
</div>

<script>
const KEYS = [
  {name:'C',enh:''},{name:'C#',enh:'D♭'},{name:'D',enh:''},
  {name:'D#',enh:'E♭'},{name:'E',enh:''},{name:'F',enh:''},
  {name:'F#',enh:'G♭'},{name:'G',enh:''},{name:'G#',enh:'A♭'},
  {name:'A',enh:''},{name:'A#',enh:'B♭'},{name:'B',enh:''}
];

let audioCtx = null;
let currentSource = null;
let rawBuffer = null;
let isPlaying = false;
let startTime = 0;
let pauseOffset = 0;
let duration = 0;
let originalKeyIndex = 0;
let targetKeyIndex = 0;
let animationFrame = null;

const $ = id => document.getElementById(id);
const speedSlider = $('speedSlider');
const speedVal = $('speedVal');
const playBtn = $('playBtn');
const playIcon = $('playIcon');
const timeline = $('timeline');
const timelineFill = $('timelineFill');
const statusDot = $('statusDot');
const statusText = $('statusText');

function init() {
  buildKeyGrids();
}

$('browseLink').onclick = () => $('fileInput').click();
$('fileInput').onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };

async function loadFile(file) {
  setStatus('', 'Decoding...');
  stopPlayback();
  pauseOffset = 0;
  rawBuffer = null;
  playBtn.disabled = true;

  const reader = new FileReader();
  reader.onload = async e => {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      rawBuffer = await audioCtx.decodeAudioData(e.target.result);
      duration = rawBuffer.duration;
      $('loadedName').textContent = file.name;
      $('fileLoaded').style.display = 'flex';
      playBtn.disabled = false;
      setStatus('ready', 'Ready to play');
    } catch(err) {
      setStatus('error', 'Error loading file');
    }
  };
  reader.readAsArrayBuffer(file);
}

function stopPlayback() {
  if (currentSource) { try { currentSource.stop(); } catch(e){} currentSource = null; }
  isPlaying = false;
  cancelAnimationFrame(animationFrame);
  playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
}

function startPlayback(offset) {
  stopPlayback();
  if (!rawBuffer) return;

  currentSource = audioCtx.createBufferSource();
  currentSource.buffer = rawBuffer;

  // KEY FIX: We must calculate the detune value relative to the playback speed.
  // When playbackRate changes, it naturally changes pitch. 
  // We offset that change + add our own transposition.
  updateAudioParams();

  currentSource.connect(audioCtx.destination);
  currentSource.start(0, Math.max(0, Math.min(offset, duration)));
  
  startTime = audioCtx.currentTime;
  pauseOffset = offset;
  isPlaying = true;
  playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  setStatus('playing', 'Playing');
  
  currentSource.onended = () => { if (isPlaying) { stopPlayback(); pauseOffset = 0; timelineFill.style.width = '0%'; } };
  tick();
}

function updateAudioParams() {
  if (!currentSource) return;
  const speed = parseInt(speedSlider.value) / 100;
  const semitones = getShift();
  
  // To keep pitch constant while changing speed, we use the property that 
  // speed-induced pitch shift is exactly -1200 * log2(speed) cents.
  // We then add our desired transposition (semitones * 100).
  const totalDetune = (semitones * 100) - (1200 * Math.log2(speed));
  
  currentSource.playbackRate.value = speed;
  currentSource.detune.value = totalDetune;
}

playBtn.onclick = () => {
  if (isPlaying) {
    pauseOffset += (audioCtx.currentTime - startTime) * (parseInt(speedSlider.value) / 100);
    stopPlayback();
    setStatus('', 'Paused');
  } else {
    startPlayback(pauseOffset);
  }
};

speedSlider.oninput = () => {
  speedVal.textContent = (speedSlider.value / 100).toFixed(2) + '×';
  if (isPlaying) updateAudioParams();
};

function getShift() {
  let s = targetKeyIndex - originalKeyIndex;
  if (s > 6) s -= 12; else if (s < -6) s += 12;
  return s;
}

function buildKeyGrids() {
  [$('originalKeyRow'), $('targetKeyRow')].forEach((row, idx) => {
    KEYS.forEach((k, i) => {
      const btn = document.createElement('button');
      btn.className = 'key-btn';
      btn.innerHTML = k.name + (k.enh ? `<span class="enh">${k.enh}</span>` : '');
      btn.onclick = () => {
        if (idx === 0) originalKeyIndex = i; else targetKeyIndex = i;
        updateKeyUI();
        if (isPlaying) updateAudioParams();
      };
      row.appendChild(btn);
    });
  });
  updateKeyUI();
}

function updateKeyUI() {
  $('originalKeyRow').querySelectorAll('.key-btn').forEach((b, i) => b.classList.toggle('orig-sel', i === originalKeyIndex));
  $('targetKeyRow').querySelectorAll('.key-btn').forEach((b, i) => b.classList.toggle('tgt-sel', i === targetKeyIndex));
  const s = getShift();
  $('shiftBadge').textContent = s === 0 ? 'No shift' : `${s > 0 ? '+' : ''}${s} semitones`;
  $('shiftBadge').classList.toggle('active', s !== 0);
}

function tick() {
  if (!isPlaying) return;
  const current = pauseOffset + (audioCtx.currentTime - startTime) * (parseInt(speedSlider.value) / 100);
  timelineFill.style.width = Math.min((current / duration) * 100, 100) + '%';
  animationFrame = requestAnimationFrame(tick);
}

function setStatus(type, msg) { statusText.textContent = msg; statusDot.className = 'dot ' + type; }

init();
</script>
</body>
</html>
