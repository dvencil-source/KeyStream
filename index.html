<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyStream — Music Transposer for Worship Teams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0c14; --bg2: #16131f; --bg3: #1e1a2e; --bg4: #251f38;
  --accent: #c8a96e; --accent2: #e8c98e; --purple: #7c6bdc;
  --purple-light: #a898f0; --text: #f0eee8; --text2: #9e9ba8;
  --text3: #6a6778; --border: rgba(200,169,110,0.15);
  --border2: rgba(200,169,110,0.08); --red: #e06060; --green: #6ec89a;
  --radius: 12px; --rsm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;}
.layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh;max-width:1200px;margin:0 auto;}
.sidebar{border-right:1px solid var(--border2);padding:24px;height:100vh;position:sticky;top:0;}
.main{padding:32px 28px;}
.logo{font-family:'Instrument Serif',serif;font-size:28px;margin-bottom:30px;padding: 0 16px;}
.logo em{color:var(--accent);font-style:italic;}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;margin-bottom:14px;}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-label::after{content:'';flex:1;height:1px;background:var(--border2);}

/* Upload Zone */
.upload-zone{border:1.5px dashed rgba(200,169,110,0.2);border-radius:var(--rsm);padding:32px 20px;text-align:center;cursor:pointer;transition:0.2s;}
.upload-zone.drag{border-color:var(--accent);background:rgba(200,169,110,0.08);transform:scale(1.01);}

/* Key Buttons */
.key-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.key-btn{width:52px;height:50px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;transition:0.1s;}
.key-btn.orig-sel{border-color:var(--purple);background:rgba(124,107,220,0.15);color:var(--purple-light);}
.key-btn.tgt-sel{border-color:var(--accent);background:var(--accent);color:var(--bg);font-weight:600;}

/* Presets */
.preset-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));gap:8px;}
.preset-btn{background:var(--bg3);border:1px solid var(--border2);padding:12px;border-radius:var(--rsm);cursor:pointer;text-align:left;transition:0.15s;}
.preset-btn:hover{border-color:var(--accent);background:rgba(200,169,110,0.05);}
.preset-btn .p-name{color:var(--text);font-size:13px;display:block;margin-bottom:2px;}
.preset-btn .p-detail{color:var(--text3);font-size:11px;display:block;}

/* Controls */
.slider-row{display:flex;align-items:center;gap:14px;}
input[type=range]{flex:1;appearance:none;background:var(--bg4);height:3px;border-radius:2px;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2);}

.play-btn{width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;}
.play-btn:hover:not(:disabled){transform:scale(1.05);background:var(--accent2);}
.play-btn:disabled{background:var(--bg4);cursor:not-allowed;opacity:0.5;}

.timeline{height:6px;background:var(--bg4);border-radius:3px;cursor:pointer;flex:1;position:relative;overflow:hidden;}
.timeline-fill{height:100%;background:var(--accent);width:0%;pointer-events:none;}

.status-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg3);border-radius:var(--rsm);margin-top:12px;font-size:13px;color:var(--text2);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text3);}
.dot.playing{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{50%{opacity:0.4}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">Key<em>Stream</em></div>
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.12em;padding:0 16px;margin-bottom:12px;">Library</div>
    <div id="libraryList" style="padding:0 16px;font-size:13px;color:var(--text3);">No saved songs yet.</div>
  </aside>

  <main class="main">
    <div style="font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:20px;display:flex;align-items:center;gap:10px;">Now playing</div>

    <div class="card">
      <div class="card-label">Audio Source</div>
      <div class="upload-zone" id="dropzone">
        <div style="font-size:16px;margin-bottom:6px;color:var(--text);">Drop your audio file here</div>
        <div style="font-size:13px;color:var(--text3);">or <span id="browseLink" style="color:var(--accent);text-decoration:underline;">browse files</span> · MP3, WAV, OGG</div>
      </div>
      <input type="file" id="fileInput" accept="audio/*" style="display:none">
      <div id="fileInfo" style="display:none;margin-top:14px;padding:12px;background:rgba(110,200,154,0.08);border:1px solid rgba(110,200,154,0.2);border-radius:var(--rsm);font-size:13px;color:var(--text);">
        <span id="loadedName"></span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Tempo Control</div>
      <div class="slider-row">
        <span style="min-width:60px;font-size:13px;color:var(--text2);">Speed</span>
        <input type="range" id="speedSlider" min="50" max="150" value="100">
        <span id="speedVal" style="min-width:50px;text-align:right;font-size:14px;color:var(--text);">1.00×</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Key Transposition</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">Original Key</div>
      <div class="key-row" id="origRow"></div>
      <div style="font-size:12px;color:var(--text2);margin:18px 0 8px;">Target Key</div>
      <div class="key-row" id="tgtRow"></div>
      <div id="shiftBadge" style="display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:13px;background:rgba(200,169,110,0.08);color:var(--text2);border:1px solid rgba(200,169,110,0.12);margin-top:14px;">No shift</div>
    </div>

    <div class="card">
      <div class="card-label">Quick Presets</div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>

    <div class="card">
      <div class="card-label">Playback</div>
      <div style="display:flex;align-items:center;gap:18px;">
        <button class="play-btn" id="playBtn" disabled>
          <svg id="playIcon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="timeline" id="timeline"><div class="timeline-fill" id="timelineFill"></div></div>
      </div>
      <div class="status-row">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Load a file to begin</span>
      </div>
    </div>
  </main>
</div>

<script>
const KEYS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const PRESETS = [
  {name:'Learning slowly', speed:0.7,  label:'70% speed'},
  {name:'Rehearsal',       speed:0.85, label:'85% speed'},
  {name:'Full speed',      speed:1.0,  label:'100% speed'},
  {name:'Capo 2 sim.',     speed:1.0,  pitch:2,  label:'+2 semitones'},
  {name:'Lower a step',    speed:1.0,  pitch:-2, label:'−2 semitones'}
];

let audioCtx, currentSource, rawBuffer, isPlaying = false;
let pauseOffset = 0, startTime = 0;
let originalKeyIndex = 0, targetKeyIndex = 0;

function init() {
  KEYS.forEach((name, i) => {
    document.getElementById('origRow').appendChild(createKeyBtn(name, i, true));
    document.getElementById('tgtRow').appendChild(createKeyBtn(name, i, false));
  });

  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.innerHTML = `<span class="p-name">${p.name}</span><span class="p-detail">${p.label}</span>`;
    btn.onclick = () => {
      document.getElementById('speedSlider').value = p.speed * 100;
      if (p.pitch !== undefined) targetKeyIndex = (originalKeyIndex + p.pitch + 12) % 12;
      updateUI();
      if (isPlaying) updateAudioParams();
    };
    document.getElementById('presetGrid').appendChild(btn);
  });
  updateUI();
}

function createKeyBtn(name, i, isOrig) {
  const btn = document.createElement('button');
  btn.className = 'key-btn';
  btn.textContent = name;
  btn.onclick = () => {
    if (isOrig) originalKeyIndex = i; else targetKeyIndex = i;
    updateUI();
    if (isPlaying) updateAudioParams();
  };
  return btn;
}

// Drag & Drop
const dz = document.getElementById('dropzone');
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
  dz.addEventListener(evt, e => e.preventDefault(), false);
  window.addEventListener(evt, e => e.preventDefault(), false);
});
dz.ondragover = () => dz.classList.add('drag');
dz.ondragleave = () => dz.classList.remove('drag');
dz.ondrop = (e) => {
  dz.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
};
document.getElementById('browseLink').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); };

async function loadFile(file) {
  if (!audioCtx) audioCtx = new AudioContext();
  setStatus('Decoding...');
  try {
    const ab = await file.arrayBuffer();
    rawBuffer = await audioCtx.decodeAudioData(ab);
    document.getElementById('loadedName').textContent = file.name;
    document.getElementById('fileInfo').style.display = 'block';
    document.getElementById('playBtn').disabled = false;
    pauseOffset = 0;
    stopPlayback();
    setStatus('Ready');
  } catch (e) { setStatus('Error loading audio'); }
}

function updateAudioParams() {
  if (!currentSource) return;
  const speed = document.getElementById('speedSlider').value / 100;
  let shift = targetKeyIndex - originalKeyIndex;
  if (shift > 6) shift -= 12; else if (shift < -6) shift += 12;
  
  const speedPitchFactor = 1200 * Math.log2(speed);
  currentSource.playbackRate.setTargetAtTime(speed, audioCtx.currentTime, 0.02);
  currentSource.detune.setTargetAtTime((shift * 100) - speedPitchFactor, audioCtx.currentTime, 0.02);
}

function startPlayback(offset) {
  if (currentSource) try { currentSource.stop(); } catch(e){}
  currentSource = audioCtx.createBufferSource();
  currentSource.buffer = rawBuffer;
  currentSource.connect(audioCtx.destination);
  updateAudioParams();
  currentSource.start(0, offset);
  startTime = audioCtx.currentTime;
  pauseOffset = offset;
  isPlaying = true;
  document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  document.getElementById('statusDot').classList.add('playing');
  tick();
}

function stopPlayback() {
  if (currentSource) try { currentSource.stop(); } catch(e){}
  isPlaying = false;
  document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  document.getElementById('statusDot').classList.remove('playing');
}

document.getElementById('playBtn').onclick = () => {
  if (!rawBuffer) return;
  if (isPlaying) {
    pauseOffset += (audioCtx.currentTime - startTime) * (document.getElementById('speedSlider').value / 100);
    stopPlayback();
  } else {
    startPlayback(pauseOffset % rawBuffer.duration);
  }
};

document.getElementById('speedSlider').oninput = () => {
  document.getElementById('speedVal').textContent = (document.getElementById('speedSlider').value / 100).toFixed(2) + '×';
  if (isPlaying) updateAudioParams();
};

document.getElementById('timeline').onclick = (e) => {
  if (!rawBuffer) return;
  const rect = document.getElementById('timeline').getBoundingClientRect();
  const seek = ((e.clientX - rect.left) / rect.width) * rawBuffer.duration;
  if (isPlaying) startPlayback(seek); else { pauseOffset = seek; tick(); }
};

function updateUI() {
  Array.from(document.getElementById('origRow').children).forEach((b, i) => b.classList.toggle('orig-sel', i === originalKeyIndex));
  Array.from(document.getElementById('tgtRow').children).forEach((b, i) => b.classList.toggle('tgt-sel', i === targetKeyIndex));
  let s = targetKeyIndex - originalKeyIndex;
  if (s > 6) s -= 12; else if (s < -6) s += 12;
  document.getElementById('shiftBadge').textContent = s === 0 ? 'No shift' : (s > 0 ? '+' : '') + s + ' semitones';
}

function tick() {
  const speed = document.getElementById('speedSlider').value / 100;
  const cur = isPlaying ? pauseOffset + (audioCtx.currentTime - startTime) * speed : pauseOffset;
  document.getElementById('timelineFill').style.width = ((cur / (rawBuffer?.duration || 1)) * 100) + '%';
  if (isPlaying) requestAnimationFrame(tick);
}

function setStatus(msg) { document.getElementById('statusText').textContent = msg; }

init();
</script>
</body>
</html>
