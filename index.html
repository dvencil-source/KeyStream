<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyStream — Music Transposer for Worship Teams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0c14;
  --bg2: #16131f;
  --bg3: #1e1a2e;
  --bg4: #251f38;
  --accent: #c8a96e;
  --accent2: #e8c98e;
  --purple: #7c6bdc;
  --purple-light: #a898f0;
  --text: #f0eee8;
  --text2: #9e9ba8;
  --text3: #6a6778;
  --border: rgba(200,169,110,0.15);
  --border2: rgba(200,169,110,0.08);
  --red: #e06060;
  --green: #6ec89a;
  --radius: 12px;
  --rsm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 10%,rgba(124,107,220,0.12) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 80% 80%,rgba(200,169,110,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}

.layout{position:relative;z-index:1;display:grid;grid-template-columns:280px 1fr;min-height:100vh;max-width:1200px;margin:0 auto;}
.sidebar{border-right:1px solid var(--border2);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden;}
.main{padding:32px 28px 80px;overflow-y:auto;}
.logo{font-family:'Instrument Serif',serif;font-size:28px;color:var(--text);letter-spacing:-0.3px;padding:24px 20px 20px;}
.logo em{font-style:italic;color:var(--accent);}
.sidebar-section{padding:0 16px;margin-bottom:8px;}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);padding:0 4px;margin-bottom:8px;}
.sidebar-scroll{flex:1;overflow-y:auto;padding-bottom:20px;}
.sidebar-scroll::-webkit-scrollbar{width:4px;}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

.song-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rsm);cursor:pointer;transition:all 0.15s;border:1px solid transparent;margin-bottom:4px;}
.song-item:hover{background:var(--bg3);border-color:var(--border2);}
.song-item.active{background:rgba(200,169,110,0.1);border-color:rgba(200,169,110,0.25);}
.song-thumb{width:36px;height:36px;border-radius:6px;background:var(--bg4);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.song-meta{flex:1;min-width:0;}
.song-name{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-detail{font-size:11px;color:var(--text3);}
.song-del{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;opacity:0;transition:opacity 0.15s;flex-shrink:0;}
.song-item:hover .song-del{opacity:1;}
.song-del:hover{color:var(--red);}
.empty-library{padding:20px 12px;text-align:center;font-size:13px;color:var(--text3);line-height:1.5;}

.page-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.page-label::after{content:'';flex:1;height:1px;background:var(--border2);}

.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;margin-bottom:14px;position:relative;animation:fadeUp 0.35s ease both;}
.card-label{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-label::after{content:'';flex:1;height:1px;background:var(--border2);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--rsm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;cursor:pointer;transition:all 0.15s;border:1px solid var(--border);background:transparent;color:var(--text2);}
.btn:hover{color:var(--text);border-color:rgba(200,169,110,0.3);background:rgba(200,169,110,0.05);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#0e0c14;font-weight:500;}
.btn-accent:hover{background:var(--accent2);border-color:var(--accent2);}
.btn-sm{padding:6px 12px;font-size:12px;}

.upload-zone{border:1.5px dashed rgba(200,169,110,0.2);border-radius:var(--rsm);padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(200,169,110,0.04);}
.upload-icon{width:48px;height:48px;border-radius:50%;background:rgba(200,169,110,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.upload-icon svg{width:22px;height:22px;fill:var(--accent);}
.upload-title{font-size:15px;color:var(--text);margin-bottom:3px;}
.upload-sub{font-size:13px;color:var(--text3);}
.upload-sub span{color:var(--accent);cursor:pointer;}

.file-loaded{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(110,200,154,0.08);border:1px solid rgba(110,200,154,0.2);border-radius:var(--rsm);margin-top:12px;}
.file-loaded svg{width:16px;height:16px;fill:var(--green);flex-shrink:0;}
.file-name-text{font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-dur{font-size:12px;color:var(--text2);}

.save-row{display:flex;gap:8px;margin-top:12px;align-items:center;}
.save-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.save-input:focus{border-color:rgba(200,169,110,0.4);}

.key-section-label{font-size:12px;color:var(--text2);margin-bottom:8px;}
.key-row{display:flex;gap:5px;flex-wrap:wrap;}
.key-btn{width:52px;height:50px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.key-btn .enh{font-size:9px;color:var(--text3);}
.key-btn:hover{border-color:rgba(200,169,110,0.4);color:var(--text);}
.key-btn.orig-sel{background:rgba(124,107,220,0.15);border-color:var(--purple);color:var(--purple-light);}
.key-btn.tgt-sel{background:var(--accent);border-color:var(--accent);color:#0e0c14;font-weight:500;}

.shift-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:13px;background:rgba(200,169,110,0.08);color:var(--text2);border:1px solid rgba(200,169,110,0.12);margin-top:14px;}
.shift-badge.active{background:rgba(200,169,110,0.12);color:var(--accent);border-color:rgba(200,169,110,0.25);}

.slider-row{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.slider-label{font-size:13px;color:var(--text2);min-width:70px;}
.slider-val{font-size:14px;color:var(--text);min-width:62px;text-align:right;}
input[type=range]{flex:1;appearance:none;background:transparent;cursor:pointer;height:20px;}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:var(--bg4);border-radius:2px;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);margin-top:-6px;border:2px solid var(--bg2);}

.bpm-row{display:flex;align-items:center;gap:16px;}
.bpm-num{font-family:'Instrument Serif',serif;font-size:44px;color:var(--text);min-width:72px;line-height:1;}
.bpm-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-top:3px;}

.player-row{display:flex;align-items:center;gap:14px;}
.play-btn{width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;color:#0e0c14;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.play-btn:hover{background:var(--accent2);transform:scale(1.04);}
.play-btn:disabled{background:var(--bg4);cursor:not-allowed;}
.play-btn svg{width:20px;height:20px;fill:#0e0c14;}
.timeline-wrap{flex:1;}
.timeline{height:4px;background:var(--bg4);border-radius:2px;cursor:pointer;position:relative;margin-bottom:6px;}
.timeline-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;pointer-events:none;}
.time-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}
.status-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg3);border-radius:var(--rsm);margin-top:12px;font-size:13px;color:var(--text2);min-height:38px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.dot.playing{background:var(--green);animation:pulse 1.5s ease infinite;}
.dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

@media(max-width:680px){
  .layout{grid-template-columns:1fr;}
  .sidebar{height:auto;position:static;border-right:none;border-bottom:1px solid var(--border2);}
  .main{padding:20px 16px 60px;}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">Key<em>Stream</em></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Song library</div>
    </div>
    <div class="sidebar-scroll" id="libraryList">
      <div class="sidebar-section">
        <div class="empty-library" id="emptyLibrary">No songs saved yet.</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="page-label">Now playing</div>

    <div class="card">
      <div class="card-label">Audio file</div>
      <div class="upload-zone" id="dropzone">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6zm-2 16a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
        </div>
        <div class="upload-title">Drop your audio file here</div>
        <div class="upload-sub">or <span id="browseLink">browse files</span></div>
      </div>
      <input type="file" id="fileInput" accept="audio/*" style="display:none">
      <div id="fileLoaded" style="display:none" class="file-loaded">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        <span class="file-name-text" id="loadedName"></span>
        <span class="file-dur" id="loadedDur"></span>
      </div>
      <div class="save-row" id="saveRow" style="display:none">
        <input class="save-input" id="saveNameInput" type="text" placeholder="Song name…">
        <button class="btn btn-accent btn-sm" onclick="saveToLibrary()">Save to library</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Tempo / BPM</div>
      <div class="bpm-row">
        <div>
          <div class="bpm-num" id="bpmDisplay">—</div>
          <div class="bpm-lbl">beats / min</div>
        </div>
        <div style="flex:1;">
          <div class="slider-row">
            <span class="slider-label">Speed</span>
            <input type="range" id="speedSlider" min="25" max="125" value="100" step="1">
            <span class="slider-val" id="speedVal">1.00×</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Key / Pitch</div>
      <div>
        <div class="key-section-label">Original key</div>
        <div class="key-row" id="originalKeyRow"></div>
      </div>
      <hr style="border:none;border-top:0.5px solid var(--border2);margin:18px 0;">
      <div>
        <div class="key-section-label">Target key</div>
        <div class="key-row" id="targetKeyRow"></div>
      </div>
      <div><span class="shift-badge" id="shiftBadge">No shift — original key</span></div>
    </div>

    <div class="card">
      <div class="card-label">Playback</div>
      <div class="player-row">
        <button class="play-btn" id="playBtn" disabled>
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="timeline-wrap">
          <div class="timeline" id="timeline">
            <div class="timeline-fill" id="timelineFill"></div>
          </div>
          <div class="time-row">
            <span id="timeCurrent">0:00</span>
            <span id="timeDuration">0:00</span>
          </div>
        </div>
      </div>
      <div class="status-row">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Load an audio file to begin</span>
      </div>
    </div>
  </main>
</div>

<script>
const KEYS = [
  {name:'C',enh:''},{name:'C#',enh:'D♭'},{name:'D',enh:''},
  {name:'D#',enh:'E♭'},{name:'E',enh:''},{name:'F',enh:''},
  {name:'F#',enh:'G♭'},{name:'G',enh:''},{name:'G#',enh:'A♭'},
  {name:'A',enh:''},{name:'A#',enh:'B♭'},{name:'B',enh:''}
];
const LIBRARY_KEY = 'keystream_library_v1';

let audioCtx      = null;
let currentSource = null;
let rawArrayBuffer= null;
let isPlaying     = false;
let startTime     = 0;
let pauseOffset   = 0;
let duration      = 0;
let originalKey   = 0;
let selectedKey   = 0;
let animFrame     = null;

const $ = id => document.getElementById(id);
const dropzone      = $('dropzone');
const fileInput     = $('fileInput');
const browseLink    = $('browseLink');
const fileLoaded    = $('fileLoaded');
const loadedName    = $('loadedName');
const loadedDur     = $('loadedDur');
const saveRow       = $('saveRow');
const saveNameInput = $('saveNameInput');
const speedSlider   = $('speedSlider');
const speedVal      = $('speedVal');
const shiftBadge    = $('shiftBadge');
const origKeyRow    = $('originalKeyRow');
const tgtKeyRow     = $('targetKeyRow');
const playBtn       = $('playBtn');
const playIcon      = $('playIcon');
const timeline      = $('timeline');
const timelineFill  = $('timelineFill');
const timeCurrent   = $('timeCurrent');
const timeDuration  = $('timeDuration');
const statusDot     = $('statusDot');
const statusText    = $('statusText');
const libraryList   = $('libraryList');
const emptyLibrary  = $('emptyLibrary');

function init() {
  buildKeyGrids();
  renderLibrary();
}

browseLink.onclick = () => fileInput.click();
fileInput.onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };
dropzone.ondragover = e => { e.preventDefault(); dropzone.classList.add('drag'); };
dropzone.ondragleave = () => dropzone.classList.remove('drag');
dropzone.ondrop = e => { e.preventDefault(); dropzone.classList.remove('drag'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); };

function loadFile(file) {
  setStatus('', 'Decoding audio…');
  stopPlayback();
  pauseOffset = 0;
  rawArrayBuffer = null;
  playBtn.disabled = true;
  fileLoaded.style.display = 'none';
  saveRow.style.display = 'none';

  const reader = new FileReader();
  reader.onload = async e => {
    rawArrayBuffer = e.target.result;
    try {
      const tmp = new AudioContext();
      const dec = await tmp.decodeAudioData(rawArrayBuffer.slice(0));
      duration = dec.duration;
      tmp.close();
      loadedName.textContent = file.name.replace(/\.[^.]+$/, '');
      loadedDur.textContent  = fmt(duration);
      fileLoaded.style.display = 'flex';
      timeDuration.textContent = fmt(duration);
      saveNameInput.value = file.name.replace(/\.[^.]+$/, '');
      saveRow.style.display = 'flex';
      playBtn.disabled = false;
      setStatus('ready', `Ready · ${file.name.replace(/\.[^.]+$/, '')}`);
    } catch(err) {
      setStatus('error', 'Could not decode audio');
    }
  };
  reader.readAsArrayBuffer(file);
}

function stopPlayback() {
  if (currentSource) { try { currentSource.stop(); currentSource.disconnect(); } catch(e){} currentSource = null; }
  if (audioCtx)      { try { audioCtx.close(); } catch(e){} audioCtx = null; }
  isPlaying = false;
  cancelAnimationFrame(animFrame);
  playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
}

async function startPlayback(offset) {
  stopPlayback();
  if (!rawArrayBuffer) return;
  try {
    audioCtx = new AudioContext();
    const decoded = await audioCtx.decodeAudioData(rawArrayBuffer.slice(0));
    const src = audioCtx.createBufferSource();
    src.buffer = decoded;

    // Tempo and Pitch decoupling
    src.playbackRate.value = getTempo();
    src.detune.value = getSemitoneShift() * 100;

    src.connect(audioCtx.destination);
    src.start(0, Math.max(0, Math.min(offset, duration - 0.1)));
    currentSource = src;
    startTime   = audioCtx.currentTime;
    pauseOffset = offset;
    isPlaying   = true;
    playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    setStatus('playing', 'Playing');
    src.onended = () => {
      if (!isPlaying) return;
      stopPlayback();
      pauseOffset = 0;
      timelineFill.style.width = '0%';
      timeCurrent.textContent = '0:00';
      setStatus('ready', 'Finished');
    };
    tick();
  } catch(err) {
    setStatus('error', 'Playback error');
  }
}

// Real-time updates without restarting
function applyTransforms() {
  if (!isPlaying || !currentSource) return;
  currentSource.playbackRate.setTargetAtTime(getTempo(), audioCtx.currentTime, 0.05);
  currentSource.detune.setTargetAtTime(getSemitoneShift() * 100, audioCtx.currentTime, 0.05);
}

playBtn.onclick = async () => {
  if (isPlaying) {
    const el = (audioCtx.currentTime - startTime) * getTempo() + pauseOffset;
    stopPlayback();
    pauseOffset = el;
    setStatus('', 'Paused');
  } else {
    await startPlayback(pauseOffset);
  }
};

timeline.onclick = e => {
  if (!rawArrayBuffer) return;
  const pct  = (e.clientX - timeline.getBoundingClientRect().left) / timeline.offsetWidth;
  const seek = pct * duration;
  if (isPlaying) startPlayback(seek);
  else { pauseOffset = seek; timelineFill.style.width = (pct * 100) + '%'; timeCurrent.textContent = fmt(seek); }
};

function tick() {
  if (!isPlaying || !audioCtx) return;
  const el  = (audioCtx.currentTime - startTime) * getTempo() + pauseOffset;
  const pct = Math.min(el / duration, 1);
  timelineFill.style.width = (pct * 100) + '%';
  timeCurrent.textContent  = fmt(el);
  animFrame = requestAnimationFrame(tick);
}

speedSlider.oninput = () => {
  speedVal.textContent = getTempo().toFixed(2) + '×';
  applyTransforms();
};
function getTempo() { return parseInt(speedSlider.value) / 100; }

function buildKeyGrids() {
  [origKeyRow, tgtKeyRow].forEach((row, rowIdx) => {
    row.innerHTML = '';
    KEYS.forEach((k, i) => {
      const btn = document.createElement('button');
      btn.className = 'key-btn';
      btn.innerHTML = k.name + (k.enh ? `<span class="enh">${k.enh}</span>` : '');
      btn.onclick = () => rowIdx === 0 ? setOriginalKey(i) : setTargetKey(i);
      row.appendChild(btn);
    });
  });
  updateKeyUI();
}

function setOriginalKey(i) { originalKey = i; updateKeyUI(); applyTransforms(); }
function setTargetKey(i)   { selectedKey = i; updateKeyUI(); applyTransforms(); }

function updateKeyUI() {
  origKeyRow.querySelectorAll('.key-btn').forEach((b, i) => b.classList.toggle('orig-sel', i === originalKey));
  tgtKeyRow.querySelectorAll('.key-btn').forEach((b, i) => b.classList.toggle('tgt-sel', i === selectedKey));
  const sh = getSemitoneShift();
  shiftBadge.textContent = sh === 0 ? 'No shift' : `${sh > 0 ? '+' : ''}${sh} semitones`;
  shiftBadge.className = 'shift-badge' + (sh !== 0 ? ' active' : '');
}

function getSemitoneShift() {
  let s = selectedKey - originalKey;
  if (s > 6) s -= 12; else if (s < -6) s += 12;
  return s;
}

function getLibrary() { try { return JSON.parse(localStorage.getItem(LIBRARY_KEY)) || []; } catch { return []; } }
function saveLibrary(lib) { localStorage.setItem(LIBRARY_KEY, JSON.stringify(lib)); }

function saveToLibrary() {
  const name = saveNameInput.value.trim();
  if (!name) return;
  const lib = getLibrary();
  lib.unshift({ id: Date.now(), name, originalKey, selectedKey, tempo: getTempo() });
  saveLibrary(lib);
  renderLibrary();
}

function renderLibrary() {
  const lib = getLibrary();
  emptyLibrary.style.display = lib.length ? 'none' : '';
  const list = libraryList.querySelector('.sidebar-section');
  list.querySelectorAll('.song-item').forEach(el => el.remove());
  lib.forEach(entry => {
    const el = document.createElement('div');
    el.className = 'song-item';
    el.innerHTML = `<div class="song-thumb">♪</div><div class="song-meta"><div class="song-name">${entry.name}</div></div>`;
    el.onclick = () => {
      originalKey = entry.originalKey;
      selectedKey = entry.selectedKey;
      speedSlider.value = entry.tempo * 100;
      speedVal.textContent = entry.tempo.toFixed(2) + '×';
      updateKeyUI();
    };
    list.appendChild(el);
  });
}

function fmt(s) { return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0'); }
function setStatus(type, msg) { statusText.textContent = msg; statusDot.className = 'dot ' + type; }

init();
</script>
</body>
</html>
