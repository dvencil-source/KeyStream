<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyStream — Music Transposer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0c14; --bg2: #16131f; --bg3: #1e1a2e; --bg4: #251f38;
  --accent: #c8a96e; --accent2: #e8c98e; --purple: #7c6bdc;
  --purple-light: #a898f0; --text: #f0eee8; --text2: #9e9ba8;
  --text3: #6a6778; --border: rgba(200,169,110,0.15);
  --border2: rgba(200,169,110,0.08); --red: #e06060; --green: #6ec89a;
  --radius: 12px; --rsm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;}
.layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh;max-width:1200px;margin:0 auto;}
.sidebar{border-right:1px solid var(--border2);padding:20px;height:100vh;position:sticky;top:0;}
.main{padding:32px 28px;}
.logo{font-family:'Instrument Serif',serif;font-size:28px;margin-bottom:30px;}
.logo em{color:var(--accent);font-style:italic;}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;margin-bottom:14px;}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-label::after{content:'';flex:1;height:1px;background:var(--border2);}
.upload-zone{border:1.5px dashed rgba(200,169,110,0.2);border-radius:var(--rsm);padding:32px 20px;text-align:center;cursor:pointer;transition:0.2s;}
.upload-zone.drag{border-color:var(--accent);background:rgba(200,169,110,0.05);}
.key-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.key-btn{width:50px;height:48px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.key-btn.orig-sel{border-color:var(--purple);background:rgba(124,107,220,0.15);color:var(--purple-light);}
.key-btn.tgt-sel{border-color:var(--accent);background:var(--accent);color:var(--bg);}
.slider-row{display:flex;align-items:center;gap:14px;}
input[type=range]{flex:1;appearance:none;background:var(--bg4);height:3px;border-radius:2px;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);}
.play-btn{width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.timeline{height:4px;background:var(--bg4);border-radius:2px;cursor:pointer;flex:1;position:relative;}
.timeline-fill{height:100%;background:var(--accent);width:0%;pointer-events:none;}
.status-row{display:flex;align-items:center;gap:8px;padding:12px;background:var(--bg3);border-radius:var(--rsm);margin-top:12px;font-size:13px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.dot.playing{background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{50%{opacity:0.3}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">Key<em>Stream</em></div>
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;">Library</div>
    <div id="libraryList" style="margin-top:10px;font-size:13px;color:var(--text3);">No saved songs.</div>
  </aside>

  <main class="main">
    <div class="card">
      <div class="card-label">Audio Source</div>
      <div class="upload-zone" id="dropzone">
        <div style="font-size:15px;margin-bottom:4px;">Drop audio file here</div>
        <div style="font-size:12px;color:var(--text3);">or <span id="browseLink" style="color:var(--accent);cursor:pointer;">browse</span></div>
      </div>
      <input type="file" id="fileInput" accept="audio/*" style="display:none">
      <div id="fileInfo" style="display:none;margin-top:12px;font-size:13px;color:var(--green);">✓ <span id="loadedName"></span></div>
    </div>

    <div class="card">
      <div class="card-label">Tempo & Speed</div>
      <div class="slider-row">
        <span style="min-width:60px;font-size:13px;">Speed</span>
        <input type="range" id="speedSlider" min="50" max="150" value="100">
        <span id="speedVal" style="min-width:45px;text-align:right;">1.00×</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Key & Transposition</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px;">Original Key</div>
      <div class="key-row" id="origRow"></div>
      <div style="font-size:12px;color:var(--text3);margin:15px 0 8px;">Target Key</div>
      <div class="key-row" id="tgtRow"></div>
      <div id="shiftBadge" style="font-size:12px;color:var(--accent);margin-top:10px;">No shift</div>
    </div>

    <div class="card">
      <div class="card-label">Playback</div>
      <div style="display:flex;align-items:center;gap:15px;">
        <button class="play-btn" id="playBtn" disabled>
          <svg id="playIcon" viewBox="0 0 24 24" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="timeline" id="timeline"><div class="timeline-fill" id="timelineFill"></div></div>
      </div>
      <div class="status-row">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Load a file to begin</span>
      </div>
    </div>
  </main>
</div>

<script>
const KEYS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let audioCtx, currentSource, rawBuffer, isPlaying = false, pauseOffset = 0, startTime = 0;
let originalKeyIndex = 0, targetKeyIndex = 0;

const $ = id => document.getElementById(id);
const speedSlider = $('speedSlider');

// --- Initialization ---
function init() {
  KEYS.forEach((name, i) => {
    const btnO = createKeyBtn(name, i, true);
    const btnT = createKeyBtn(name, i, false);
    $('origRow').appendChild(btnO);
    $('tgtRow').appendChild(btnT);
  });
  updateUI();
}

function createKeyBtn(name, i, isOrig) {
  const btn = document.createElement('button');
  btn.className = 'key-btn';
  btn.textContent = name;
  btn.onclick = () => {
    if (isOrig) originalKeyIndex = i; else targetKeyIndex = i;
    updateUI();
    if (isPlaying) updateAudioParams();
  };
  return btn;
}

// --- Audio Logic ---
async function loadFile(file) {
  if (!audioCtx) audioCtx = new AudioContext();
  setStatus('', 'Decoding...');
  const arrayBuffer = await file.arrayBuffer();
  rawBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  $('loadedName').textContent = file.name;
  $('fileInfo').style.display = 'block';
  $('playBtn').disabled = false;
  setStatus('ready', 'Ready');
}

function updateAudioParams() {
  if (!currentSource) return;
  const speed = speedSlider.value / 100;
  const shift = getShift();
  
  // CRITICAL FIX: To prevent tempo drift when changing keys, 
  // we must cancel out the pitch change that 'playbackRate' causes automatically.
  const speedPitchFactor = 1200 * Math.log2(speed);
  const targetDetune = (shift * 100) - speedPitchFactor;

  currentSource.playbackRate.setTargetAtTime(speed, audioCtx.currentTime, 0.05);
  currentSource.detune.setTargetAtTime(targetDetune, audioCtx.currentTime, 0.05);
}

function startPlayback(offset) {
  if (currentSource) currentSource.stop();
  currentSource = audioCtx.createBufferSource();
  currentSource.buffer = rawBuffer;
  currentSource.connect(audioCtx.destination);
  
  updateAudioParams();
  
  currentSource.start(0, offset);
  startTime = audioCtx.currentTime;
  pauseOffset = offset;
  isPlaying = true;
  $('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  $('statusDot').classList.add('playing');
  tick();
}

function stopPlayback() {
  if (currentSource) currentSource.stop();
  isPlaying = false;
  $('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  $('statusDot').classList.remove('playing');
}

// --- Events ---
$('playBtn').onclick = () => {
  if (isPlaying) {
    pauseOffset += (audioCtx.currentTime - startTime) * (speedSlider.value / 100);
    stopPlayback();
  } else {
    startPlayback(pauseOffset % rawBuffer.duration);
  }
};

speedSlider.oninput = () => {
  $('speedVal').textContent = (speedSlider.value / 100).toFixed(2) + '×';
  if (isPlaying) updateAudioParams();
};

$('timeline').onclick = (e) => {
  if (!rawBuffer) return;
  const pct = (e.clientX - $('timeline').getBoundingClientRect().left) / $('timeline').offsetWidth;
  const seek = pct * rawBuffer.duration;
  if (isPlaying) startPlayback(seek); else { pauseOffset = seek; updateTimeline(); }
};

// --- Dropzone Logic (Fixed) ---
const dz = $('dropzone');
dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('drag'); };
dz.ondragleave = () => dz.classList.remove('drag');
dz.ondrop = (e) => {
  e.preventDefault();
  dz.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
};
$('browseLink').onclick = () => $('fileInput').click();
$('fileInput').onchange = (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); };

// --- Helpers ---
function getShift() {
  let s = targetKeyIndex - originalKeyIndex;
  if (s > 6) s -= 12; else if (s < -6) s += 12;
  return s;
}

function updateUI() {
  Array.from($('origRow').children).forEach((b, i) => b.classList.toggle('orig-sel', i === originalKeyIndex));
  Array.from($('tgtRow').children).forEach((b, i) => b.classList.toggle('tgt-sel', i === targetKeyIndex));
  const s = getShift();
  $('shiftBadge').textContent = s === 0 ? 'No shift' : `${s > 0 ? '+' : ''}${s} semitones`;
}

function updateTimeline() {
  const cur = isPlaying ? pauseOffset + (audioCtx.currentTime - startTime) * (speedSlider.value / 100) : pauseOffset;
  $('timelineFill').style.width = ((cur / rawBuffer.duration) * 100) + '%';
}

function tick() {
  if (!isPlaying) return;
  updateTimeline();
  requestAnimationFrame(tick);
}

function setStatus(type, msg) { $('statusText').textContent = msg; }

init();
</script>
</body>
</html>
